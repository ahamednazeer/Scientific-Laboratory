services:
  backend:
    image: scientific-lab-backend:latest
    container_name: scientific-lab-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: sqlite:///./data/lab_ar.db
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models
      - backend_data:/app/data

  frontend:
    image: scientific-lab-frontend:latest
    container_name: scientific-lab-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"

volumes:
  backend_data:
